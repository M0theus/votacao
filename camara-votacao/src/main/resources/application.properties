spring.application.name=camara-votacao

# Database
spring.datasource.url=jdbc:mysql://localhost:3306/votacao
spring.datasource.username=root
spring.datasource.password=lloobboo2k19

# JPA - IMPORTANTE: essas configurações criam as tabelas
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Criar tabelas mesmo se não houver conexão inicial
spring.jpa.defer-datasource-initialization=true

# Logging para ver o que está acontecendo
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.tool.schema.internal=DEBUG